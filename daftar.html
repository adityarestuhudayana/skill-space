<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSpace - Daftar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Pembungkus Utama (Halaman Web/Desktop) */
        body {
            background-color: #f4f5f9; /* Warna background netral modern */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Kartu Registrasi (Otomatis Menyesuaikan Web & Mobile) */
        .auth-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px; /* Lebar ideal kartu di laptop */
            padding: 40px 30px;
            border-radius: 16px; /* Sudut melengkung di desktop */
            box-shadow: 0 10px 30px rgba(74, 58, 255, 0.08); /* Bayangan soft */
            display: flex;
            flex-direction: column;
        }

        /* Status bar bawaan disembunyikan di layar besar */
        .status-bar {
            display: none; 
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #000;
        }

        .status-icons i {
            margin-left: 5px;
        }

        .back-btn {
            color: #4a3aff;
            font-size: 20px;
            cursor: pointer;
            margin-bottom: 20px;
            align-self: flex-start;
            text-decoration: none;
            transition: transform 0.2s;
        }

        .back-btn:hover {
            transform: translateX(-3px); /* Efek interaktif saat dihover di laptop */
        }

        .page-title.left {
            text-align: left;
            font-size: 24px;
            font-weight: bold;
            color: #000;
            margin-bottom: 5px;
        }

        .page-subtitle {
            font-size: 14px;
            color: #555;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i.toggle-password {
            position: absolute;
            right: 15px;
            color: #777;
            cursor: pointer;
        }

        .input-control {
            width: 100%;
            background-color: #f0f2f5; /* Lebih terang dan bersih dibanding #d9d9d9 */
            border: 1px solid transparent;
            border-radius: 10px;
            padding: 14px 15px;
            font-size: 14px;
            color: #333;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-control:focus {
            background-color: #ffffff;
            border-color: #4a3aff;
            box-shadow: 0 0 0 3px rgba(74, 58, 255, 0.15); /* Efek glow fokus biru */
        }

        .btn-primary {
            width: 100%;
            background-color: #4a3aff;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            transition: background 0.2s ease;
        }

        .btn-primary:hover {
            background-color: #3525e6;
        }

        .auth-footer {
            text-align: center;
            font-size: 13px;
            color: #555;
            margin-top: 20px;
        }

        .auth-footer a {
            color: #4a3aff;
            font-weight: bold;
            text-decoration: none;
        }

        /* --- MEDIA QUERIES (Sistem Otomatis Responsif) --- */

        /* Ketika dibuka di Handphone (Lebar layar di bawah 576px) */
        @media (max-width: 576px) {
            body {
                padding: 0;
                background-color: #ffffff; /* Latar luar berubah putih senada kartu */
                align-items: flex-start; /* Layout rapi menempel dari atas layar HP */
            }

            .auth-card {
                max-width: 100%;
                min-height: 100vh; /* Mengisi penuh layar HP secara vertikal */
                border-radius: 0; /* Hilangkan lengkungan siku di sudut HP */
                box-shadow: none; /* Hilangkan bayangan luar */
                padding: 20px 25px;
            }

            /* Memunculkan status bar tiruan khusus di HP */
            .status-bar {
                display: flex;
            }
        }
    </style>
</head>
<body>

    <div class="auth-card">
        
        <div class="status-bar">
            <span>09.15</span>
            <div class="status-icons">
                <i class="fa-solid fa-wifi"></i>
                <i class="fa-solid fa-signal"></i>
                <i class="fa-solid fa-battery-full"></i>
            </div>
        </div>

        <a href="masuk.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i>
        </a>

        <h2 class="page-title left">Daftar</h2>
        <p class="page-subtitle">Daftar sekarang untuk mulai melihat berbagai jasa mahasiswa</p>

        <form onsubmit="return false;">
            <div class="form-group">
                <label>Nama Lengkap</label>
                <div class="input-wrapper">
                    <input type="text" class="input-control" placeholder="Masukkan Nama Lengkap" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <input type="email" class="input-control" placeholder="Masukkan Email kampus" required>
                </div>
            </div>

            <div class="form-group">
                <label>NIM</label>
                <div class="input-wrapper">
                    <input type="text" class="input-control" placeholder="Masukan Nomor Induk Mahasiswa" required>
                </div>
            </div>

            <div class="form-group">
                <label>Kata Sandi</label>
                <div class="input-wrapper">
                    <input type="password" class="input-control" placeholder="Masukkan Kata Sandi" required>
                    <i class="fa-regular fa-eye-slash toggle-password"></i>
                </div>
            </div>

            <button class="btn-primary" type="submit" style="margin-top: 25px;">Daftar</button>
        </form>

        <div class="auth-footer">
            Sudah punya akun? <a href="masuk.html">Masuk</a>
        </div>
    </div>

</body>
</html>
