<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSpace - Konfirmasi Pesanan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #8e8e93; /* Latar belakang luar abu-abu */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container Utama (Frame HP) */
        .app-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 390px;
            height: 844px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border-radius: 16px;
            overflow: hidden;
        }

        /* Header Navigasi */
        .app-header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 25px 20px 15px 20px;
            background-color: #fff;
            border-bottom: 1px solid #f0f0f0;
        }

        .back-btn {
            color: #4a3aff;
            font-size: 20px;
            text-decoration: none;
            cursor: pointer;
        }

        .header-title {
            font-size: 16px;
            font-weight: 700;
            color: #000;
        }

        /* AREA SCROLL: Konten tengah bisa di-scroll */
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background-color: #fff;
        }

        .scrollable-content::-webkit-scrollbar {
            width: 4px;
        }
        .scrollable-content::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }

        /* Card Informasi Produk */
        .product-card {
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 25px;
            background-color: #fff;
        }

        .product-img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 10px;
        }

        .product-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .product-title {
            font-size: 15px;
            font-weight: 700;
            color: #000;
        }

        .product-seller {
            font-size: 12px;
            color: #555;
        }

        .product-price {
            font-size: 14px;
            font-weight: 700;
            color: #000;
            margin-top: 2px;
        }

        /* Bagian Pengatur Jumlah Pesanan */
        .qty-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
            margin-bottom: 25px;
        }

        .section-label {
            font-size: 14px;
            font-weight: 700;
            color: #000;
        }

        .qty-counter {
            display: flex;
            align-items: center;
            border: 1px solid #dcdcdc;
            border-radius: 20px;
            padding: 4px 12px;
            gap: 15px;
        }

        .qty-btn {
            background: none;
            border: none;
            font-size: 14px;
            color: #4a3aff;
            cursor: pointer;
            font-weight: 600;
            padding: 2px 6px;
        }

        .qty-number {
            font-size: 13px;
            font-weight: 600;
            color: #000;
        }

        /* Form Group (Catatan & Lampiran) */
        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #000;
            margin-bottom: 12px;
        }

        .text-area-control {
            width: 100%;
            height: 120px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 14px;
            font-size: 13px;
            color: #333;
            outline: none;
            resize: none;
        }

        .text-area-control::placeholder {
            color: #999;
        }

        /* Area Unggah File (Upload Box) */
        .upload-box {
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }

        .upload-box:hover {
            background-color: #fafafa;
        }

        .upload-icon {
            font-size: 28px;
            color: #757575;
        }

        .upload-text-main {
            font-size: 13px;
            color: #555;
            line-height: 1.4;
        }

        .upload-text-sub {
            font-size: 10px;
            color: #999;
        }

        /* AREA FIXED BOTTOM: Rincian Harga & Tombol Mengunci di Bawah */
        .bottom-bar {
            background-color: #ffffff;
            border-top: 1px solid #f0f0f0;
            padding: 15px 20px 20px 20px;
        }

        .billing-table {
            width: 100%;
            margin-bottom: 15px;
            border-collapse: collapse;
        }

        .billing-table td {
            padding: 4px 0;
            font-size: 14px;
            color: #000;
        }

        .billing-table .row-bold td {
            font-weight: 700;
        }

        .billing-table td:last-child {
            text-align: right;
        }

        .btn-submit-order {
            width: 100%;
            background-color: #4a3aff;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: block;
            transition: background 0.2s;
        }

        .btn-submit-order:hover {
            background-color: #3525e6;
        }

        /* --- MEDIA QUERIES (Sistem Otomatis Responsif Layar HP) --- */
        @media (max-width: 480px) {
            body {
                padding: 0;
                background-color: #fff;
            }

            .app-container {
                max-width: 100%;
                height: 100vh;
                box-shadow: none;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="app-header">
            <a href="detail-jasa.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h2 class="header-title">Konfirmasi Pesanan</h2>
        </div>

        <div class="scrollable-content">
            
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1542831371-29b0f74f9713?q=80&w=600&auto=format&fit=crop" class="product-img" alt="Bantuan Coding">
                <div class="product-details">
                    <h3 class="product-title">Bantuan Coding</h3>
                    <p class="product-seller">Oleh Sagara Mahendra</p>
                    <p class="product-price">Rp 60.000</p>
                </div>
            </div>

            <div class="qty-section">
                <span class="section-label">Jumlah Pesanan</span>
                <div class="qty-counter">
                    <button class="qty-btn" onclick="decrementQty()">-</button>
                    <span class="qty-number" id="qty-display">1</span>
                    <button class="qty-btn" onclick="incrementQty()">+</button>
                </div>
            </div>

            <div class="form-group">
                <label>Catatan Untuk Penjual</label>
                <textarea class="text-area-control" placeholder="Jelaskan detail kebutuhan Anda..."></textarea>
            </div>

            <div class="form-group">
                <label>Lampiran (Opsional)</label>
                <div class="upload-box">
                    <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
                    <p class="upload-text-main">Klik untuk unggah atau seret file ke sini</p>
                    <p class="upload-text-sub">PNG, JPG, atau PDF (Maks. 10MB)</p>
                </div>
            </div>

        </div>

        <div class="bottom-bar">
            <table class="billing-table">
                <tr>
                    <td>Estimasi Selesai</td>
                    <td style="font-weight: 700;">2 Hari</td>
                </tr>
                <tr>
                    <td>Biaya Layanan</td>
                    <td>Rp 3.000</td>
                </tr>
                <tr class="row-bold">
                    <td>Total Pesanan</td>
                    <td id="total-display">Rp 60.000</td>
                </tr>
            </table>

            <button class="btn-submit-order" onclick="alert('Permintaan Berhasil Dikirim!')">
                Kirim Permintaan
            </button>
        </div>

    </div>

    <script>
        let currentQty = 1;
        const basePrice = 60000;
        
        function incrementQty() {
            currentQty++;
            updateUI();
        }
        
        function decrementQty() {
            if (currentQty > 1) {
                currentQty--;
                updateUI();
            }
        }
        
        function updateUI() {
            document.getElementById('qty-display').innerText = currentQty;
            let totalPrice = currentQty * basePrice;
            document.getElementById('total-display').innerText = "Rp " + totalPrice.toLocaleString('id-ID');
        }
    </script>
</body>
</html>
