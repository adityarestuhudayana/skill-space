<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran Berhasil - SkillSpace</title>
    <meta name="description" content="Pembayaran berhasil! Pesanan Anda telah dikonfirmasi di SkillSpace.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ============================================
           PEMBAYARAN BERHASIL - SkillSpace Mobile
           ============================================ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-50: #EEF2FF;
            --primary-100: #E0E7FF;
            --primary-400: #818CF8;
            --primary-500: #6366F1;
            --primary-600: #4F46E5;
            --primary-700: #4338CA;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;
            --success: #10B981;
            --success-dark: #059669;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition: 0.25s ease;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #FFFFFF;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Container (Responsive) */
        .app {
            background-color: transparent;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            position: relative;
            margin: 0 auto;
        }
        
        /* Desktop Container */
        @media (min-width: 800px) {
            .app {
                max-width: 600px;
                padding-bottom: 40px;
            }
            .success-hero {
                padding-top: 100px;
            }
        }

        /* ========== SUCCESS HERO ========== */
        .success-hero {
            background: transparent;
            text-align: center;
            padding: 60px 32px 40px;
            flex-shrink: 0;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .success-icon i {
            font-size: 36px;
            color: #fff;
        }

        .success-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--gray-900);
            margin-bottom: 8px;
            animation: fadeInUp 0.5s ease 0.3s both;
        }

        .success-desc {
            font-size: 14px;
            color: var(--gray-500);
            line-height: 1.6;
            max-width: 260px;
            margin: 0 auto;
            animation: fadeInUp 0.5s ease 0.4s both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== CONTENT AREA ========== */
        .content-area {
            flex: 1;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            animation: fadeInUp 0.5s ease 0.5s both;
        }

        /* ========== INFO CARD ========== */
        .info-card {
            background: #fff;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 32px;
        }

        .info-card__title {
            font-size: 15px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--gray-100);
        }

        .info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
        }

        .info-row + .info-row {
            border-top: 1px solid var(--gray-50);
        }

        .info-row__label {
            font-size: 13px;
            color: var(--gray-500);
        }

        .info-row__value {
            font-size: 13px;
            font-weight: 700;
            color: var(--gray-800);
            text-align: right;
        }

        .info-row__value--primary {
            color: var(--primary-600);
        }

        /* Status badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: #D1FAE5;
            color: var(--success-dark);
            font-size: 12px;
            font-weight: 700;
            border-radius: 20px;
        }

        .status-badge__dot {
            width: 7px;
            height: 7px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.3); }
        }

        /* ========== ACTION BUTTONS ========== */
        .action-buttons {
            margin-top: auto;
            padding-bottom: 36px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            animation: fadeInUp 0.5s ease 0.6s both;
        }

        @media (min-width: 800px) {
            .action-buttons {
                flex-direction: row;
            }
            .btn {
                flex: 1;
            }
        }

        .btn {
            width: 100%;
            padding: 15px;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition);
            font-family: inherit;
            text-align: center;
            display: block;
        }

        .btn--primary {
            background: linear-gradient(135deg, var(--primary-500) 0%, var(--primary-600) 100%);
            color: #fff;
            border: none;
            box-shadow: 0 4px 16px rgba(79, 70, 229, 0.35);
        }

        .btn--primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.45);
        }

        .btn--outline {
            background: #fff;
            color: var(--primary-600);
            border: 2px solid var(--primary-600);
        }

        .btn--outline:hover {
            background: var(--primary-50);
        }

        /* ========== CONFETTI PARTICLES ========== */
        .confetti-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 10;
        }

        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 2px;
            animation: confettiFall 3s ease-in forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(400px) rotate(720deg);
                opacity: 0;
            }
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 540px) {
            body {
                background-color: #fff;
                display: flex;
                flex-direction: column;
                min-height: 100vh;
            }
            .app {
                max-width: 100%;
                flex: 1;
                margin: 0;
            }
            .success-hero {
                background: linear-gradient(180deg, var(--primary-50) 0%, #FFFFFF 100%);
            }
        }
    </style>
</head>
<body>

    <div class="app" id="app-success">

        <!-- Confetti Animation -->
        <div class="confetti-container" id="confetti-container"></div>

        <!-- Success Hero -->
        <div class="success-hero">
            <div class="success-icon" id="success-icon">
                <i class="fa-solid fa-check"></i>
            </div>
            <h1 class="success-title">Pembayaran Berhasil!</h1>
            <p class="success-desc">Pembayaranmu telah diterima.<br>Pesanan akan segera diproses penjual.</p>
        </div>

        <!-- Content Area -->
        <div class="content-area">

            <!-- Payment Info Card -->
            <div class="info-card" id="info-card">
                <div class="info-card__title">Informasi Pembayaran</div>
                <div class="info-row">
                    <span class="info-row__label">Metode Pembayaran</span>
                    <span class="info-row__value">GoPay</span>
                </div>
                <div class="info-row">
                    <span class="info-row__label">ID Transaksi</span>
                    <span class="info-row__value">#TRX-2938475</span>
                </div>
                <div class="info-row">
                    <span class="info-row__label">Total Bayar</span>
                    <span class="info-row__value info-row__value--primary">Rp 63.000</span>
                </div>
                <div class="info-row">
                    <span class="info-row__label">Status</span>
                    <span class="info-row__value">
                        <span class="status-badge">
                            <span class="status-badge__dot"></span>
                            Berhasil
                        </span>
                    </span>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button class="btn btn--primary" id="btn-hubungi-penjual" onclick="hubungiPenjual()">
                    Hubungi Penjual
                </button>
                <a href="#" class="btn btn--outline" id="btn-lihat-pesanan">
                    Lihat Pesanan Saya
                </a>
            </div>

        </div>

    </div>

    <script>
        // Generate confetti particles on load
        window.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('confetti-container');
            const colors = ['#6366F1', '#818CF8', '#10B981', '#FBBF24', '#F97316', '#EC4899', '#3B82F6'];

            for (let i = 0; i < 40; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.width = (Math.random() * 8 + 4) + 'px';
                confetti.style.height = (Math.random() * 8 + 4) + 'px';
                confetti.style.animationDelay = (Math.random() * 1.5) + 's';
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                container.appendChild(confetti);
            }

            // Remove confetti after animation
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        });

        function hubungiPenjual() {
            alert('Fitur chat dengan penjual akan segera tersedia!');
        }
    </script>

</body>
</html>
